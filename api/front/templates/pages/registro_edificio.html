{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Edificio - INES</title>
    <link rel="stylesheet" href="{% static 'CSS/navbar.css' %}">
    <link rel="stylesheet" href="{% static 'CSS/perfil.css' %}">
</head>
<body>
    {% include 'pages/components/navbar.html' %}

    <div class="perfil-page">
        <form class="perfil-card user-profile-container" method="post">
            {% csrf_token %}
            <div class="profile-header">
                <h2 class="profile-title">Registro de Edificio</h2>
            </div>
            
            <div class="profile-form">
                <div class="form-row">
                    <div class="form-group full-width">
                        <label for="nombreEdificio">Nombre del Edificio</label>
                        <div class="input-with-icon">
                            <input placeholder="Ej. Residencia La Campiña" type="text" id="nombreEdificio" name="nombreEdificio" required />
                            <span class="edit-icon">&#127970;</span>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group half-width">
                        <label for="parroquia">Parroquia</label>
                        <div class="input-with-icon">
                            <input placeholder="Ej. El Recreo" type="text" id="parroquia" name="parroquia" required />
                            <span class="edit-icon">&#128205;</span>
                        </div>
                    </div>
                    <div class="form-group half-width">
                        <label for="rif">RIF</label>
                        <div class="input-with-icon">
                            <input placeholder="J-00000000-0" type="text" id="rif" name="rif" required />
                            <span class="edit-icon">&#128188;</span>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group full-width">
                        <label for="cantApartamentos">Cantidad de Apartamentos</label>
                        <div class="input-with-icon">
                            <input placeholder="Número total de unidades" type="number" id="cantApartamentos" name="cantApartamentos" min="1" required />
                            <span class="edit-icon">&#128226;</span>
                        </div>
                    </div>
                </div>

                <div class="actions-row">
                    {% include 'pages/components/boton.html' with type='submit' class='save-button' text='Registrar Edificio' %}
                </div>
            </div>
        </form>
    </div>
</body>
</html>
